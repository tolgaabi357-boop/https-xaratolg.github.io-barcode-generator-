<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Barcode Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 120px; }
    .barcodes { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .barcode-item { text-align: center; }
    button { padding: 10px 20px; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>Barcode Generator (Max 20)</h2>

  <p>Füge deine IDs ein (jede in eine neue Zeile):</p>
  <textarea id="inputData">PALLET_5EesyuU_Z
PALLET_6lhGuMB_Z
PALLET_GSyTCbI_Z
PALLET_HuKd6m8_Z
PALLET_N85ZT3t_Z
PALLET_ShPBNxn_Z</textarea>
  <br>
  <button onclick="generateBarcodes()">Barcodes erstellen</button>

  <div class="barcodes" id="barcodeContainer"></div>

  <script>
    function generateBarcodes() {
      const container = document.getElementById("barcodeContainer");
      container.innerHTML = "";

      const lines = document.getElementById("inputData").value
        .split("\n")
        .map(l => l.trim())
        .filter(l => l !== "");

      if (lines.length > 20) {
        alert("Maximal 20 Barcodes erlaubt!");
        return;
      }

      lines.forEach((text, index) => {
        const div = document.createElement("div");
        div.className = "barcode-item";

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        JsBarcode(svg, text, {
          format: "CODE128",
          width: 2,
          height: 60,
          displayValue: true
        });

        div.appendChild(svg);
        container.appendChild(div);
      });
    }

    // Auto-generate on load
    generateBarcodes();
  </script>

</body>
</html>
